<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คลิปประชุมออนไลน์ คณิตศาสตร์</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Kanit', sans-serif; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.8s ease forwards; }
    .fade-up-delay { animation: fadeUp 0.8s ease 0.3s forwards; opacity: 0; }
    .fade-up-delay2 { animation: fadeUp 0.8s ease 0.6s forwards; opacity: 0; }
    body { box-sizing: border-box; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="h-full w-full flex flex-col items-center justify-center relative overflow-auto" style="background: linear-gradient(135deg, #FFF9E6 0%, #F0EDE4 50%, #FFFDF5 100%);">
    
    <!-- พื้นหลังสัญลักษณ์คณิตศาสตร์ -->
    <div class="absolute top-10 left-10 text-4xl opacity-10 text-gray-500 float-anim">∑</div>
    <div class="absolute top-20 right-16 text-3xl opacity-10 text-gray-500 float-anim" style="animation-delay: 1s;">π</div>
    <div class="absolute bottom-20 left-20 text-3xl opacity-10 text-gray-500 float-anim" style="animation-delay: 0.5s;">∫</div>
    <div class="absolute bottom-16 right-12 text-4xl opacity-10 text-gray-500 float-anim" style="animation-delay: 1.5s;">∞</div>
    <div class="absolute top-1/3 left-8 text-2xl opacity-10 text-gray-500 float-anim" style="animation-delay: 2s;">Δ</div>

    <!-- เนื้อหาหลัก -->
    <div class="text-center px-6 max-w-lg z-10">
      
      <!-- โลโก้ที่อัปเดตเป็นรูปภาพ -->
      <div class="fade-up mb-8">
        <div class="w-28 h-28 mx-auto rounded-3xl shadow-lg flex items-center justify-center bg-white overflow-hidden border-4 border-white">
          <img src="https://scontent.fkdt3-2.fna.fbcdn.net/v/t39.30808-6/688165663_1991394741463787_3042113768127239520_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeF61cSC7DHgXBvR_AYuqKguwmer-IbbLDHCZ6v4htssMZyzXl6mY17uQ1PFkTMqy_CE_unCD9MIO3F-j0csIgJc&_nc_ohc=AMbJ8zBOaHwQ7kNvwHPAEMg&_nc_oc=AdoRz7jTbj0qUJMuZPqtE2n52SjlfoH9qPOBw2pygg1GUYujwaTpnQZ0C3fFSV47kzCeNJp0dOoXl5etCujva8lw&_nc_zt=23&_nc_ht=scontent.fkdt3-2.fna&_nc_gid=uaEw4W1u6T5EyJrBUBFRHw&_nc_ss=7b2a8&oh=00_Af6ryUBoYWPuoh8xPXRhJZIma_eKF9c4SiJXEKJVyjs_6w&oe=69FBC3B0" 
               alt="Logo" 
               class="w-full h-full object-cover">
        </div>
      </div>
      
      <!-- ข้อความหัวเรื่อง -->
      <h1 class="fade-up-delay text-3xl font-bold text-gray-800 mb-3" style="font-size: 30.4px;">
        คลิปประชุมออนไลน์ คณิตศาสตร์
      </h1>
      <p class="fade-up-delay text-gray-500 mb-10 text-lg font-light" style="font-size: 17.6px; color: #6b7280;">
        รวมคลิปการประชุมและบทเรียนคณิตศาสตร์ออนไลน์
      </p>
      
      <!-- ปุ่มกดลิงก์ Google Drive --> 
      <a href="https://drive.google.com/file/d/1fwLH3cwIbiboZDcu5KwLK2ImQzUZK2iZ/view?usp=drive_link" target="_blank" rel="noopener noreferrer" class="fade-up-delay2 inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-lg font-semibold text-gray-800 shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-105" style="background: linear-gradient(135deg, #FFE082, #FFD54F); font-size: 17.6px; color: #1f2937;"> 
        <i data-lucide="play-circle" style="width:24px; height:24px;"></i> 
        <span>เข้าดูคลิปประชุม</span> 
        <i data-lucide="external-link" style="width:18px; height:18px; opacity:0.6;"></i> 
      </a>

    </div>
  </div>

  <script>
    // สร้าง Icon
    lucide.createIcons();
  </script>
</body>
</html>
